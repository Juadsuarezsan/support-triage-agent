services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-support}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support_dev}
      POSTGRES_DB: ${POSTGRES_DB:-support}
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U support"], interval: 5s, retries: 10 }
  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes: [qdrant-data:/qdrant/storage]
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://support:support_dev@postgres:5432/support
      QDRANT_URL: http://qdrant:6333
    depends_on: { postgres: { condition: service_healthy }, qdrant: { condition: service_started } }
    ports: ["8000:8000"]
    volumes: [./src:/app/src, ./data:/app/data]
volumes:
  postgres-data:
  qdrant-data:
